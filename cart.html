<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CubexNova Store - Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toast" id="toast"></div>

  <header>
    <div class="badge">✨ Official Digital Store</div>
    <h1>CubexNova Store</h1>
    <p>Buy ranks, and digital extras</p>
  </header>

  <nav>
    <a href="index.html">Ranks</a>
    <a href="other.html">Other</a>
    <a class="active" href="cart.html">Cart <span id="cartCount">0</span></a>
  </nav>

  <main>
    <div class="notice">
      PayPal opens in a new tab. After payment, manually check PayPal before giving the rank/item.
    </div>

    <h2>Your Cart</h2>

    <div class="cart">
      <div id="cartItems"></div>
      <h3>Total: $<span id="cartTotal">0.00</span></h3>
    </div>

    <div class="checkout">
      <h2>Checkout Details</h2>

      <label>Game Username</label>
      <input id="username" type="text" placeholder="Enter your game username">

      <label>Email</label>
      <input id="email" type="email" placeholder="Enter your email">

      <button class="paypal" onclick="checkoutPayPal()">Pay with PayPal</button>
    </div>
  </main>

  <footer>© 2026 CubexNova Store. All rights reserved.</footer>

  <script src="store.js"></script>
</body>
</html>
